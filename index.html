<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User Page Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="model.js"></script>
    <script src="render.js"></script>
    <script src="main.js"></script>
</head>

<body>
    <div id="app-container">
        <div class="user-section">
            <div id="main-user-container"></div>
            <div id="friends-container"></div>
        </div>

        <div id="quote-container"></div>
        <div id="pokemon-container"></div>
        <div id="about-me-container"></div>

        <div class="actions-area">

            <a href="#app-container">
                <button id="btn-generate">Generate User</button>
            </a>

            <button id="btn-save">Save User Page</button>


            <select id="saved-users-dropdown">
                <option value="">Saved Users</option>
            </select>
        </div>

    </div>
</body>

</html>
